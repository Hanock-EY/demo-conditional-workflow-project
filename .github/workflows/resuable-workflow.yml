name: Resuable Deploy
on: 
    workflow_call:
        inputs:
            artifact-name:
                description: 'Name of the artifact to download'
                required: false
                default: dist
                type: string
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Get build artifacts
              uses: actions/download-artifact@v6
              with:
                name: ${{ inputs.artifact-name }}
            - name: Display artifact contents
              run: ls
            - name: Deploy
              run: echo "Deploying..."